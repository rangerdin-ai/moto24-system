  var oc={'สูง':'o-hi','กลาง':'o-mid','ต่ำ':'o-lo'};
  var rows=R.map(function(x){
    var act=x.paid?'<span class="pill p-good">ชำระแล้ว</span>':(x.b<3?'<button class="btn gr" style="padding:2px 10px;font-size:11px" onclick="recordPay('+x.id+')">รับชำระ</button>':'<span class="muted">-</span>');

}

function payClassText(amt,due1,fee2){var f=due1-fee2;if(amt<=0)return '<span class="muted">กรอกยอดรับชำระ</span>';if(amt<due1)return '<span style="color:#a16207;font-weight:600">จ่ายบางส่วน</span> — ยังไม่นับผลงาน · ตามเก็บต่อ';if(amt>=2*f)return '<span style="color:#185fa5;font-weight:600">ผ่อนควบ (≥2 งวด)</span> — นับผลงาน + ผ่อนควบ';return '<span style="color:#15803d;font-weight:600">ครบ 1 งวด</span> — นับผลงาน ✓';}

function payAmtBlock(x,id){var f=x.f||0,due1=f+(x.fee||0);return '<div style="background:#f0faf3;border:1px solid #cdebd7;border-radius:9px;padding:10px 12px;margin-top:10px"><div style="font-size:12.5px;font-weight:600;color:#15803d;margin-bottom:7px">รับชำระ — ค่างวด '+fmt(f)+(x.fee?(' + ค่าปรับ/อื่น '+fmt(x.fee)):'')+' = ต้องจ่าย '+fmt(due1)+' บาท/งวด</div><div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap"><span style="font-size:12px;color:var(--muted)">ยอดรับชำระจริง</span><input id="_payamt" value="'+due1+'" oninput="payClassTog('+id+')" style="width:120px;text-align:right;font-size:15px"> <span style="font-size:12px;color:var(--muted)">บาท</span></div><div id="_payclass" style="margin-top:7px;font-size:12.5px">'+payClassText(due1,due1,(x.fee||0))+'</div><div style="margin-top:10px"><div class="muted" style="font-size:12px;margin-bottom:5px">ประเภทรับ / ประเมินพฤติกรรม</div><select id="_pbhv" style="width:100%;padding:6px 8px;font-size:13px"><option value="">— เลือกก่อน —</option><option value="self">ชำระเอง (ลูกค้ามาจ่ายเอง)</option><option value="sms">โทร / SMS (โทรแจ้ง/ส่ง SMS ก่อน)</option><option value="field">ลงพื้นที่ (ออกติดตาม)</option><option value="partial">บางส่วน (จ่ายน้อยกว่างวด)</option></select></div></div>';}
function recordPay(id,amt){var x=CUST[id];var f=x.f||0,due1=f+(x.fee||0);
  if(amt==null){var el=document.getElementById('_payamt');amt=el?(parseInt(String(el.value).replace(/[^0-9]/g,''))||0):0;if(!amt)amt=due1;}
  var full=(amt>=due1&&amt>0);var wasPd=(x.pd>0&&!paidPartial(x)),wasCoh=(x.cn>=1&&x.cn<=12&&x.pn>=x.cn);
  var pbhvEl=document.getElementById('_pbhv');if(pbhvEl&&!pbhvEl.value){alert('กรุณาเลือกประเภทรับ / พฤติกรรมการชำระก่อนบันทึก');return;}x.payBehavior=pbhvEl?pbhvEl.value:'';
  x.pl=amt;x.pa=Math.max(x.pa||0,amt);x.pd=TODAY_DAY;x.pdate=TODAY_STR;
  if(full){x.paid=true;x.opp='สูง';x.pst='K';x.pc=1;if(x.cn>=1)x.pn=Math.max(x.pn||0,x.cn);x.p2date=null;}else{x.paid=false;x.pst='P';x.opp='กลาง';}
  var lab=!full?'จ่ายบางส่วน':(amt>=2*f?'ผ่อนควบ':'ครบงวด');
  x.log.push({t:'รับชำระ',r:lab+' '+fmt(amt)+' บาท · บันทึกวันที่ '+TODAY_LABEL});
  if(full&&!wasPd&&typeof BAHT!=='undefined'&&BAHT[x.s]&&x.g&&BAHT[x.s][x.g])BAHT[x.s][x.g][0]+=x.f;
  if(full&&!wasCoh&&x.cn>=1&&x.cn<=12&&typeof COH!=='undefined'&&COH[x.s]){var cf=x.f||0;COH[x.s].all[x.cn][0]++;COH[x.s].all[x.cn][2]+=cf;if(x.st==='hp'||x.st==='pw'){COH[x.s][x.st][x.cn][0]++;COH[x.s][x.st][x.cn][2]+=cf;}}
  var b=DATA.find(function(bb){return brCode(bb.name)===x.s;});
  if(b){rebuildDays(b);computeAct(b);computeCmp(b);}if(typeof touchSave==='function')touchSave(x.s);
  toast('บันทึก'+lab+' '+(x.n||'')+' · '+fmt(amt)+' บาท'+(full?' — นับผลงาน':' — ยังไม่นับ (ตามต่อ)'));
  if(_detailCode!=null)openCustDetail(id);else if(_listSpec)renderListWrap();else if(typeof _gqv!=='undefined'&&document.getElementById('_gres'))renderGlobalRes();else if(typeof _apptOpen!=='undefined'&&_apptOpen)openApptList();else renderCust();
  if(typeof renderBell==='function')renderBell();if(STEP>=4)renderStep();
}
function recordOther(id){var x=CUST[id];var ty=document.getElementById('_dty').value;var rs=(document.getElementById('_drs')||{}).value||'';var nt=(document.getElementById('_dnt')||{}).value||'';
  if(ty==='ชำระ'){recordPay(id);return;}

  var _isPid=ty==='ปิดบัญชี'||ty.indexOf('ปิดบัญชี_')===0;
  var _ctL={'ปิดบัญชี_รับเล่ม':'รับเล่มคืน','ปิดบัญชี_กู้ต่อ':'กู้ต่อ','ปิดบัญชี_ติดโอน':'ติดโอน'};
  var detail=(REMOVE.indexOf(ty)>=0)?(nt||'-'):(_isPid?(_ctL[ty]||'ปิดบัญชี')+(nt?' · '+nt:''):(rs+(nt?(' · '+nt):'')));

  x.log.push({t:_isPid?'ปิดบัญชี':ty,r:detail+' · บันทึกวันที่ '+TODAY_LABEL});
  if(ty==='ติดต่อ'&&(rs.indexOf('ไม่ได้')>=0||rs.indexOf('ไม่เจอ')>=0)){x.opp='ต่ำ';}
  if(REMOVE.indexOf(ty)>=0){x.statusTag=ty;x.statusDate=TODAY_LABEL;x.statusDateStr=TODAY_STR;x.opp='ต่ำ';}
  if((ty==='ยึดรถ'||ty==='คืนรถ')&&x.amType==='1'){var _spEl=document.getElementById('_seize_pay_'+id);var _spAmt=_spEl?parseFloat(String(_spEl.value).replace(/[^0-9.]/g,''))||0:0;if(_spAmt>0&&x.f>0&&_spAmt>=x.f){x.pl=_spAmt;x.pa=Math.max(x.pa||0,_spAmt);x.pd=TODAY_DAY;x.pdate=TODAY_STR;x.pc=1;x.paid=true;x.pst='K';x.opp='สูง';x.log.push({t:'รับชำระ',r:'รับพร้อม'+ty+' '+_spAmt+' บาท · บันทึกวันที่ '+TODAY_LABEL});}}
  if(_isPid){x.paid=true;x.opp='สูง';x.pst='K';x.pa=x.f;x.pl=x.f;x.pd=TODAY_DAY;x.pc=1;x.pdate=TODAY_STR;x.statusTag='ปิดบัญชี';x.closeType=ty;x.statusDate=TODAY_LABEL;}
  var bo=DATA.find(function(bb){return brCode(bb.name)===x.s;});if(bo){rebuildDays(bo);computeAct(bo);computeCmp(bo);}if(typeof touchSave==='function')touchSave(x.s);if(typeof renderBell==='function')renderBell();
  toast('บันทึก'+ty+' · '+TODAY_LABEL+' เรียบร้อย');
  openCustDetail(id);
  if(STEP>=4)renderStep();
}

function leakT(b){return b.plan.leak2||0;}
function recT(b){return ['g3','g4','g5','g6','g7'].reduce(function(s,k){return s+(b.plan.rec[k]||0);},0);}
function rec36(b){return ['g3','g4','g5','g6'].reduce(function(s,k){return s+(b.plan.rec[k]||0);},0);}
function rec7(b){return b.plan.rec.g7||0;}
function cutT(b){return ['g3','g4','g5','g6','g7'].reduce(function(s,k){return s+(b.plan.cut[k]||0);},0);}

function cut7(b){return b.plan.cut.g7||0;}
function collectSum(b){return ['g0','g1','g2'].reduce(function(s,k){return s+Math.min(b.plan.collect[k]||0,b[k]);},0);}

function stickyT4(){
  var tbl=document.querySelector('.dwrap table');
  if(!tbl)return;
  // Skip tables with colspan group headers (e.g. t4other: ปิดบัญชี/ขายรถใหม่/ขายจำนำเล่ม)
  // because measuring a colspan=3 header width as a sticky offset pushes data columns
  // far off screen and makes them appear blank or in wrong positions.
  var firstRowThs=[].slice.call(tbl.querySelectorAll('thead tr:first-child th'));
  if(firstRowThs.some(function(th){return (parseInt(th.getAttribute('colspan'))||1)>1;}))return;
  var ths=[].slice.call(tbl.querySelectorAll('thead tr th'),0,4);
  var left=0;
  ths.forEach(function(th,i){
    var w=th.offsetWidth;
    var cells=[].slice.call(tbl.querySelectorAll('tr th:nth-child('+(i+1)+'),tr td:nth-child('+(i+1)+')'));
    cells.forEach(function(el){
      el.style.position='sticky';
      el.style.left=left+'px';
      el.style.zIndex=el.tagName==='TH'?'4':'2';
      if(el.tagName==='TD'){
        var tr=el.parentElement;
        if(!tr.className||['sub-t','zone-t','grand','mine','gband'].every(function(k){return tr.className.indexOf(k)<0;}))
          el.style.background='#fff';
      }
    });
    left+=w;
  });
  [].slice.call(tbl.querySelectorAll('tr.gband td')).forEach(function(td){
    td.style.background=window.getComputedStyle(td).backgroundColor;
    td.style.position='sticky';
    td.style.left='0';
    td.style.zIndex='3';
  });
}

function startPoll(){
  if(_pollTimer)clearInterval(_pollTimer);
  if(!SYNC.url)return;
  if(!SYNC._ts)SYNC._ts={};
  var _pollMs=(role==='branch')?60000:30000;
  _pollTimer=setInterval(function(){
    fetch(apiURL('action=poll&period='+encodeURIComponent(SYNC.period)))
      .then(function(r){return r.json();})
      .then(function(j){
        if(!j||!j.ok||!j.timestamps){console.log('[poll] ❌ no timestamps',j);return;}
        var reload=false;var _changed=[];
        Object.keys(j.timestamps).forEach(function(br){
          if(role==='branch'&&SYNC.authCode&&br!==SYNC.authCode)return;
          if(SYNC._ts[br]!==j.timestamps[br]){SYNC._ts[br]=j.timestamps[br];reload=true;_changed.push(br);}
        });
        console.log('[poll] ts check reload='+reload+' changed='+JSON.stringify(_changed));
        if(reload){syncLoad(function(ok){if(ok){renderAll();toast('🔄 รับข้อมูลใหม่ ['+_changed.join(',')+']');}});}
      }).catch(function(){});
  },_pollMs);
}
function parsePortfolioExcel(rows,period,isNewFmt){
  var pParts=period.split('-');
  var cycleM=parseInt(pParts[1])||6;
  var cycleY_th=parseInt(pParts[0])||2569;
  var cycleY=cycleY_th-543;
  function parseDate(s){var p=String(s||'').trim().split('/');if(p.length!==3)return null;var d=p.map(Number);return isNaN(d[0]+d[1]+d[2])?null:d;}
  function gregY(y){return y>2500?y-543:y;}  // แปลงปี พ.ศ. → ค.ศ. ถ้าจำเป็น
  // ── DEBUG: เปิด F12 Console ดูค่านี้หลัง import ──
  var _d5=[];for(var _di=1;_di<=Math.min(5,rows.length-1);_di++){var _dr=rows[_di];_d5.push({r17:_dr[17],r19:_dr[19],r38:_dr[38]});}
  console.log('[PPE] cycleM='+cycleM+' cycleY='+cycleY+' rows='+rows.length);
  console.log('[PPE first5]',JSON.stringify(_d5));
  // ────────────────────────────────────────────────
  function oppCalc(b,pst,bk,ct,pa){
    if(pa>0)return 'สูง';if(b===0)return 'สูง';if(pst==='K')return 'สูง';
    if(pst==='B'||bk>=1)return 'ต่ำ';
    if(ct.indexOf('ไม่ได้')>=0||ct.indexOf('ไม่เจอ')>=0)return 'ต่ำ';
    if(b>=2)return 'ต่ำ';return 'กลาง';
  }
  var ZM_LOCAL=ZONEMAP||{};
  var groups={};var brMeta={};var globalId=0;
  for(var ri=1;ri<rows.length;ri++){
    var r=rows[ri];
    var cno=String(r[5]||'').trim();if(!cno)continue;
    var cd=String(r[1]||'').split('-')[0].trim();if(cd.length===1&&!isNaN(parseInt(cd)))cd='0'+cd;if(!cd)continue;
    var b=Math.min(7,Math.max(0,parseInt(r[15]||0)||0));
    var fee=Math.round(parseFloat(r[18]||0)||0);
    var la=parseInt(r[16]||0)||0;
    var p2=Math.round(parseFloat(r[34]||0)||0);
    var pa=Math.round(parseFloat(r[27]||0)||0);
    var bk=parseInt(r[36]||0)||0;
    var pst=String(r[29]||'').substring(0,3);
    var ct=String(r[31]||'').substring(0,18);
    var off=String(r[39]||'').substring(0,14);
    var du=String(r[17]||'').substring(0,10);
    var pp=parseDate(r[19]);var pd=0;var pdstr=String(r[19]||'').substring(0,10);
    if(pp&&pp[1]===cycleM&&gregY(pp[2])===cycleY)pd=pp[0];
    var cp=parseDate(r[45]);var cn=0;var cdate=String(r[45]||'').substring(0,10);
    if(cp){var nn=(cycleM-cp[1])+(cycleY-gregY(cp[2]))*12;if(nn>=1&&nn<=12)cn=nn;}
    var asn=String(r[44]||'').trim();
    var _comp=['บริษัท','จำกัด','ร้าน','หจก','ห้าง','มอเตอร์','โมโต','คาร์','ยานยนต์'];
    var _isp=!!asn&&!_comp.some(function(k){return asn.indexOf(k)>=0;});
    var st=(String(r[4]).trim()==='ตัดสต็อก'?'hp':(_isp?'pw':'ot'));
    var pcnt=parseInt(r[3]||0)||0;
    var kept=parseInt(r[35]||0)||0;
    var lc=String(r[32]||'').substring(0,10);
    var _du=parseDate(r[17]);var pcyc=(_du&&(gregY(_du[2])*12+_du[1])>(cycleY*12+cycleM))?1:0;
    var _ed=parseDate(r[47]);var edate=String(r[47]||'').substring(0,10);
    var mat=(_ed&&_ed[1]===cycleM&&gregY(_ed[2])===cycleY)?1:0;
    var fdue=String(r[46]||'').substring(0,10);
    var tel=String(r[11]||'').substring(0,15);
    var arr=Math.round(parseFloat(r[21]||0)||0);
    var bal=Math.round(parseFloat(r[26]||0)||0);
    var amType=String(r[38]||'').trim();
    var g=(r[38]===1||r[38]===2||r[38]===3)?parseInt(r[38]):(b<3?1:(b<7?2:3));
    var rec={id:globalId++,s:cd,n:r[8],b:b,f:fee,la:la,ct:ct,p2:p2,bk:bk,pst:pst,of:off,
             du:du,pd:pd,pdate:pdstr,pa:pa,opp:oppCalc(b,pst,bk,ct,pa),g:g,cn:cn,
             cdate:cdate,st:st,pn:pcnt,lc:lc,kp:kept,pc:pcyc,ed:edate,mat:mat,
             cno:cno,fd:fdue,arr:arr,bal:bal,tel:tel,agent:String(r[39]||'').trim(),amType:amType};
    if(!groups[cd])groups[cd]=[];
    groups[cd].push(rec);
    if(!brMeta[cd]){brMeta[cd]={name:String(r[1]||cd).trim(),code:cd,g:[0,0,0,0,0,0,0,0],total:0};}
    brMeta[cd].g[b]++;brMeta[cd].total++;
  }
  var branches=Object.keys(brMeta).map(function(cd){
    var m=brMeta[cd];var zm=ZM_LOCAL[cd]||[1,'used'];
    return {code:cd,name:m.name,zone:zm[0],type:zm[1],
            g0:m.g[0],g1:m.g[1],g2:m.g[2],g3:m.g[3],g4:m.g[4],g5:m.g[5],g6:m.g[6],g7:m.g[7],total:m.total};
  });
  return {groups:groups,branches:branches};
}

function importMonthRun(){
  var msg=document.getElementById('impMsg');

  if(!period){msg.innerHTML='<span style="color:var(--bad)">กรุณาเลือกรอบเดือน</span>';return;}
  if(!fileEl.files||!fileEl.files[0]){msg.innerHTML='<span style="color:var(--bad)">กรุณาเลือกไฟล์ Excel</span>';return;}

  msg.innerHTML='<span style="color:var(--warn)">กำลังอ่านไฟล์...</span>';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var isNewFmt=!!wb.Sheets['DebtCollectionAssignment'];
      var ws=wb.Sheets['DebtCollectionAssignment']||wb.Sheets['Assignment'];
      if(!ws){msg.innerHTML='<span style="color:var(--bad)">ไม่พบชีท Assignment หรือ DebtCollectionAssignment</span>';return;}

          msg.innerHTML='<span style="color:var(--warn)">กำลังประมวลผล '+totalCust+' ราย...</span>';
          // ── client-side: populate CUST + rebuild COH ────────────────────

            if(x.cn>=1&&x.cn<=12){
              var c=x.s;
              if(!COH[c]){COH[c]={all:{},hp:{},pw:{}};['all','hp','pw'].forEach(function(kk){for(var i=1;i<=12;i++)COH[c][kk][i]=[0,0,0,0];});}
              var dn=(x.pn>=x.cn||x.paid===true||x.statusTag==='ปิดบัญชี'),f=x.f||0;
              COH[c].all[x.cn][1]++;COH[c].all[x.cn][3]+=f;

            }

          // Rebuild t1n / workTotal / c1done / days / advance / cumColl จาก CUST ที่ import ใหม่

          // Rebuild CMP (แยกตามงวดค้าง) + act (งาน 3-6, 7+)

function parsePortfolioExcel(rows,period,isNewFmt){
  var pParts=period.split('-');
  var cycleM=parseInt(pParts[1])||6;
  var cycleY_th=parseInt(pParts[0])||2569;
  var cycleY=cycleY_th-543;
  function parseDate(s){
    // Excel serial number → JS Date (UTC)
    if(typeof s==='number'&&s>1){var _d=new Date(Math.round((s-25569)*86400*1000));return [_d.getUTCDate(),_d.getUTCMonth()+1,_d.getUTCFullYear()];}
    // JS Date object
    if(s instanceof Date){return [s.getDate(),s.getMonth()+1,s.getFullYear()];}
    // text string — support / - . separators
    var p=String(s||'').trim().split(/[\/\-\.]/);
    if(p.length!==3)return null;
    var d=p.map(Number);if(isNaN(d[0]+d[1]+d[2]))return null;
    // convert Buddhist Era year to Gregorian (year > 2500)
    if(d[2]>2500)d[2]-=543;
    return d;
  }
  function oppCalc(b,pst,bk,ct,pa){
    if(pa>0)return 'สูง';if(b===0)return 'สูง';if(pst==='K')return 'สูง';
    if(pst==='B'||bk>=1)return 'ต่ำ';
    if(ct.indexOf('ไม่ได้')>=0||ct.indexOf('ไม่เจอ')>=0)return 'ต่ำ';
    if(b>=2)return 'ต่ำ';return 'กลาง';
  }
  var ZM_LOCAL=ZONEMAP||{};
  var _d5b=[];for(var _dib=1;_dib<=Math.min(5,rows.length-1);_dib++){var _drb=rows[_dib];_d5b.push({r17:_drb[17],r19:_drb[19],r38:_drb[38]});}
  console.log('[PPE] cycleM='+cycleM+' cycleY='+cycleY+' rows='+rows.length);
  console.log('[PPE first5]',JSON.stringify(_d5b));
  var groups={};var brMeta={};var globalId=0;
  for(var ri=1;ri<rows.length;ri++){
    var r=rows[ri];
    var cno=String(r[5]||'').trim();if(!cno)continue;
    // ── branch code ──────────────────────────────────────────────────────────
    var cd;
    if(isNewFmt){var _s=String(r[0]||'').trim();cd=(_s.toUpperCase().charAt(0)==='B'&&_s.slice(1).match(/^\d+$/))?_s.slice(1):_s;}
    else{cd=String(r[1]||'').split('-')[0].trim();}
    if(cd.length===1&&!isNaN(parseInt(cd)))cd='0'+cd;if(!cd)continue;
    // ── bucket ───────────────────────────────────────────────────────────────
    var b;
    b=Math.min(7,Math.max(0,parseInt(r[15]||0)||0));
    var fee=Math.round(parseFloat(r[18]||0)||0);
    var la=parseInt(r[16]||0)||0;
    var p2=Math.round(parseFloat(r[34]||0)||0);
    var pa=Math.round(parseFloat(r[27]||0)||0);
    var bk=parseInt(r[36]||0)||0;
    var pst=String(r[29]||'').substring(0,3);
    var ct=String(r[31]||'').substring(0,18);
    var off=String(r[39]||'').substring(0,14);
    var du=String(r[17]||'').substring(0,10);
    var pp=parseDate(r[19]);var pd=0;var pdstr=String(r[19]||'').substring(0,10);
    if(pp&&pp[1]===cycleM&&pp[2]===cycleY)pd=pp[0];
    var cp=parseDate(r[46]);var cn=0;var cdate=String(r[45]||'').substring(0,10);
    if(cp){var nn=(cycleM-cp[1])+(cycleY-cp[2])*12+(isNewFmt?1:0);if(nn>=1&&nn<=12)cn=nn;}
    var asn=String(r[44]||'').trim();
    var _comp=['บริษัท','จำกัด','ร้าน','หจก','ห้าง','มอเตอร์','โมโต','คาร์','ยานยนต์'];
    var _isp=!!asn&&!_comp.some(function(k){return asn.indexOf(k)>=0;});
    // ── st (hp/pw/ot) ────────────────────────────────────────────────────────
    var stag=isNewFmt?String(r[37]||'').trim():'';
    var st;
    if(isNewFmt){st=_isp?'pw':'hp';}
    else{st=(String(r[4]).trim()==='ตัดสต็อก'?'hp':(_isp?'pw':'ot'));}
    var pcnt=parseInt(r[3]||0)||0;
    var kept=parseInt(r[35]||0)||0;
    var lc=String(r[32]||'').substring(0,10);
    var _du=parseDate(r[17]);var pcyc=(_du&&(_du[2]*12+_du[1])>(cycleY*12+cycleM))?1:0;
    var _ed=parseDate(r[47]);var edate=String(r[47]||'').substring(0,10);
    var mat=(_ed&&_ed[1]===cycleM&&_ed[2]===cycleY)?1:0;
    var fdue=String(r[46]||'').substring(0,10);
    // ── name / tel ───────────────────────────────────────────────────────────
    var _name=r[8];
    var tel=String(r[11]||'').substring(0,15);
    var arr=Math.round(parseFloat(r[21]||0)||0);
    var bal=Math.round(parseFloat(r[26]||0)||0);
    var amType=String(r[38]||'').trim();
    var g=(r[38]===1||r[38]===2||r[38]===3)?parseInt(r[38]):(b<3?1:(b<7?2:3));
    if(amType!=='1'&&amType!=='2'&&amType!=='3')amType=g===2?'2':g===3?'3':'1';
    var rec={id:globalId++,s:cd,n:_name,b:b,f:fee,la:la,ct:ct,p2:p2,bk:bk,pst:pst,of:off,
             du:du,pd:pd,pdate:pdstr,pa:pa,opp:oppCalc(b,pst,bk,ct,pa),g:g,cn:cn,
             cdate:cdate,st:st,pn:pcnt,lc:lc,kp:kept,pc:pcyc,ed:edate,mat:mat,
             cno:cno,fd:fdue,arr:arr,bal:bal,tel:tel,agent:String(r[39]||'').trim(),amType:amType,paid:pd>0,statusTag:stag};
    if(!groups[cd])groups[cd]=[];
    groups[cd].push(rec);
    if(!brMeta[cd]){brMeta[cd]={name:String(r[1]||cd).trim(),code:cd,g:[0,0,0,0,0,0,0,0],total:0};}
    brMeta[cd].g[b]++;brMeta[cd].total++;
  }
  var branches=Object.keys(brMeta).map(function(cd){
    var m=brMeta[cd];var zm=ZM_LOCAL[cd]||[1,'used'];
    return {code:cd,name:m.name,zone:zm[0],type:zm[1],
            g0:m.g[0],g1:m.g[1],g2:m.g[2],g3:m.g[3],g4:m.g[4],g5:m.g[5],g6:m.g[6],g7:m.g[7],total:m.total};
  });
  return {groups:groups,branches:branches};
}
